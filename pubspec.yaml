name: lockin
description: AI-powered home workout & looksmax planner
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  http: ^1.2.0
  shared_preferences: ^2.2.2
  supabase_flutter: ^2.5.0
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  flutter_dotenv: ^5.1.0
  google_fonts: ^6.2.1
  firebase_core: ^3.12.0
  firebase_messaging: ^15.2.0
  flutter_local_notifications: ^21.0.0
  flutter_tts: ^4.0.2
  pedometer: ^4.2.0
  permission_handler: ^11.3.1
  crypto: ^3.0.7
  audioplayers: ^6.1.0
  sqflite: ^2.3.3
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - .env
